stages:
  - build
  - deploy

backend:
  # Official docker image.
  image: docker:latest
  stage: build
  services:
    - docker:dind
  variables:
    IMAGE_TAG: $CI_REGISTRY_IMAGE:backend_dev
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - cd backend
  script:
    - docker build --pull --network host -t "$IMAGE_TAG" .
    - docker push "$IMAGE_TAG"
  only:
    refs:
      - dev
    changes:
      - backend/**/*

deploy_dev:
  image: ubuntu:22.04
  stage: deploy
  services:
    - docker:dind
  before_script:
    # Setup SSH deploy keys
  - apt-get update -qq
  - apt-get install -qq git
  # Setup SSH deploy keys
  - 'which ssh-agent || ( apt-get install -qq openssh-client )'
  - eval $(ssh-agent -s)
  - ssh-add <(echo "$SSH_PRIVATE_KEY")
  - mkdir -p ~/.ssh
  - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
  script:
    - ssh $USER@$DEV_HOST "cd /opt/dtek_backend && docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY && docker-compose pull && docker-compose down && docker-compose up -d && docker image prune -f && exit"
  only:
    - dev


backend_master:
 # Official docker image.
 image: docker:latest
 stage: build
 services:
   - docker:dind
 variables:
   IMAGE_TAG: $CI_REGISTRY_IMAGE:backend_master
 before_script:
   - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
   - cd backend
 script:
   - docker build --pull --network host -t $IMAGE_TAG .
   - docker push $IMAGE_TAG
 only:
   refs:
     - main
   changes:
     - backend/**/*

